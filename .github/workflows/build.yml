name: Build & Push WAN2.2 TI2V

on:
  push:
    branches: [main]
    paths:
      - 'handler.py'
      - 'Dockerfile'
      - 'handler_fp8.py'
      - 'Dockerfile.fp8'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-bf16:
    name: Build BF16 image (latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            romantony/story-studio-wan2:latest
            romantony/story-studio-wan2:${{ github.sha }}
          cache-from: type=gha,scope=bf16
          cache-to: type=gha,mode=max,scope=bf16

  build-fp8:
    name: Build FP8 image (fp8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fp8
          push: true
          tags: |
            romantony/story-studio-wan2:fp8
            romantony/story-studio-wan2:fp8-${{ github.sha }}
          cache-from: type=gha,scope=fp8
          cache-to: type=gha,mode=max,scope=fp8
